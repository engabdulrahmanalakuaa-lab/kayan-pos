name: Build Kayan POS to EXE
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # خطوة إضافية لتهيئة أدوات MSBuild لمنع مشاكل node-gyp مع sqlite3
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # إجبار npm على استخدام أدوات Visual Studio المتاحة على السيرفر
      - name: Configure MSVS Version for node-gyp
        run: |
          npm config set msvs_version 2022
          npm config set python python3

      - name: Install Dependencies
        run: npm install

      - name: Build Electron App to EXE
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kayan-Bukhari-POS-Installer
          path: dist/*.exe

name: Build Kayan POS to EXE
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # تثبيت المكتبات مع منع بناء السورس كود والاعتماد على الجاهز
      - name: Install Dependencies
        run: npm install --build-from-source=false

      # بناء التطبيق وتوجيه الأداة لمنع تجميع الـ dependencies داخل السيرفر
      - name: Build Electron App to EXE
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          electron_config_buildDependenciesFromSource: "false"

      # رفع الملف التنفيذي الناتج لتتمكن من تحميله
      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kayan-Bukhari-POS-Installer
          path: dist/*.exe
